<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>影人合作表演 - 交互版</title>
    <style>
        body {
            margin: 0;
            background: #f5e8d3;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 4px solid #333;
            background: #fffaf0;
        }

        .tips {
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body><canvas id="stage" width="900" height="500"></canvas>
    <div class="tips">操作说明:<br>
        1点击发光点触发动作<br>
        2拖拽蓝色点(上身)+红色点(下身)方向一致-人影移动<br>3同时同向旋转-人影转身</div>
    <script>
        const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d'); const W = 900, H = 500;
        let puppetX = 450, puppetY = 280;//人影中心位置
        let puppetAngle = 0; //整体旋转角度(度)
        let isFlipped = false; // 是否镜像翻转
        let currentDirection = -1; // 当前朝向: -1为向左(初始), 1为向右
        //控制点(相对于人影中心的偏移)一根据你图片手动微调
        const controlPoints = [
            { id: 'head', x: 0, y: -120, color: '#00f0ff', radius: 30, type: 'upper' }, //头
            { id: 'lhand', x: -80, y: -30, color: '#00f0ff', radius: 25, type: 'upper' },//左手
            { id: 'rhand', x: 70, y: -40, color: '#00f0ff', radius: 25, type: 'upper' },//右手
            { id: 'lfoot', x: -40, y: 90, color: '#ff0066', radius: 25, type: 'lower' },//左脚
            { id: 'rfoot', x: 35, y: 95, color: '#ff0066', radius: 25, type: 'lower' }//右脚
        ];
        // 记录拖拽状态
        let activePoints = new Set(); // 当前正在被拖拽的点集合
        let pointIds = {}; // 记录每个点对应的pointerId
        let initialPositions = {}; // 记录每个点按下时的初始位置
        let currentPositions = {}; // 记录每个点的当前位置
        let pointPressTime = {}; // 记录每个点按下的时间戳
        const SIMULTANEOUS_THRESHOLD = 1000; // 同时按下的时间阈值(毫秒) - 改为1秒
        let isDragging = false; // 是否正在拖拽中
        let needRedraw = true; // 是否需要重绘
        let img = new Image();
        img.src = './0.png';//- 换成你的图片路径
        function draw() {
            ctx.clearRect(0, 0, W, H);
            //背景(羊皮纸)
            ctx.fillStyle = '#f5e8d3';
            ctx.fillRect(0, 0, W, H);
            ctx.save();
            ctx.translate(puppetX, puppetY);
            ctx.rotate(puppetAngle * Math.PI / 180);

            // 镜像翻转处理
            if (isFlipped) {
                ctx.scale(-1, 1);
            }

            //绘制皮影人物
            ctx.drawImage(img, -img.width / 2, -img.height / 2);

            //绘制发光控制点(实时高亮)
            controlPoints.forEach(p => {
                const px = p.x;
                const py = p.y;
                //发光
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(px, py, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color + '44'; //半透明
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }

        canvas.addEventListener('pointerdown', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            //转换到人影坐标系
            const dx = mx - puppetX;
            const dy = my - puppetY;
            const rotatedX = dx * Math.cos(-puppetAngle * Math.PI / 180) - dy * Math.sin(-puppetAngle * Math.PI / 180);
            const rotatedY = dx * Math.sin(-puppetAngle * Math.PI / 180) + dy * Math.cos(-puppetAngle * Math.PI / 180);
            for (let p of controlPoints) {
                if (Math.hypot(rotatedX - p.x, rotatedY - p.y) < p.radius + 10) {
                    activePoints.add(p);
                    pointIds[e.pointerId] = p.id; // 记录pointerId对应的点
                    initialPositions[p.id] = { x: mx, y: my }; // 记录该点按下时的初始位置
                    pointPressTime[p.id] = Date.now(); // 记录按下时间
                    isDragging = true; // 开始拖拽
                    needRedraw = true;
                    e.preventDefault();
                    return;
                }
            }
        });
        canvas.addEventListener('pointermove', e => {
            if (!isDragging || activePoints.size === 0) return;

            // 检查这个pointerId是否对应某个点
            const pointId = pointIds[e.pointerId];
            if (!pointId) return; // 不是已按下的点

            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // 判断是否有upper和lower类型的点同时被拖拽
            const hasUpper = Array.from(activePoints).some(p => p.type === 'upper');
            const hasLower = Array.from(activePoints).some(p => p.type === 'lower');

            // 只有同时按住两种类型的点才能移动图片
            if (hasUpper && hasLower) {
                // 获取upper和lower的点
                const upperPoint = Array.from(activePoints).find(p => p.type === 'upper');
                const lowerPoint = Array.from(activePoints).find(p => p.type === 'lower');

                if (upperPoint && lowerPoint) {
                    // 计算两个点相对于各自初始位置的移动向量
                    const upperInitPos = initialPositions[upperPoint.id];
                    const lowerInitPos = initialPositions[lowerPoint.id];
                    const upperCurrPos = currentPositions[upperPoint.id];
                    const lowerCurrPos = currentPositions[lowerPoint.id];

                    const upperDx = upperCurrPos.x - upperInitPos.x;
                    const upperDy = upperCurrPos.y - upperInitPos.y;
                    const lowerDx = lowerCurrPos.x - lowerInitPos.x;
                    const lowerDy = lowerCurrPos.y - lowerInitPos.y;

                    const upperDistance = Math.hypot(upperDx, upperDy);
                    const lowerDistance = Math.hypot(lowerDx, lowerDy);

                    // 计算各自的移动角度
                    const upperAngle = Math.atan2(upperDy, upperDx) * 180 / Math.PI;
                    const lowerAngle = Math.atan2(lowerDy, lowerDx) * 180 / Math.PI;

                    // 检测方向一致性:两个移动方向的角度差小于30度
                    const angleDiff = Math.abs(upperAngle - lowerAngle);
                    const normalizedAngleDiff = angleDiff > 180 ? 360 - angleDiff : angleDiff;
                    const isDirectionConsistent = normalizedAngleDiff < 30;

                    // 计算共同的移动方向和距离
                    const commonDx = upperDx + lowerDx; // X方向上的平均移动
                    const commonDy = upperDy + lowerDy; // Y方向上的平均移动
                    const commonDistance = Math.min(upperDistance, lowerDistance); // 取较小移动距离

                    // 只有当两个点都移动了足够距离,且方向一致时才移动图片
                    if (isDirectionConsistent && (upperDistance > 2 || lowerDistance > 2)) {
                        // 沿着共同方向移动,使用较小距离
                        puppetX += commonDx;
                        puppetY += commonDy;
                        needRedraw = true;
                    } else {
                        // 方向不一致,显示提示
                        console.log('方向不一致,无法移动 - 上身和下身移动方向差异过大');
                    }
                }
            }

            // 更新所有点的当前位置
            currentPositions[pointId] = { x: mx, y: my };

            draw();
        });
        canvas.addEventListener('pointerup', e => {
            // 检查这个pointerId是否对应某个点
            const pointId = pointIds[e.pointerId];
            if (!pointId) return;

            // 移除该点
            const point = Array.from(activePoints).find(p => p.id === pointId);
            if (point) {
                activePoints.delete(point);
                delete initialPositions[pointId];
                delete currentPositions[pointId];
                delete pointPressTime[pointId];
                delete pointIds[e.pointerId];
                needRedraw = true;
            }

            // 如果没有点在按下了,停止拖拽
            if (activePoints.size === 0) {
                isDragging = false;
            }
        });
        //支持多点触摸(手机必备)
        canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        //启动
        img.onload = () => {
            // 使用requestAnimationFrame优化渲染
            function animate() {
                draw();
                requestAnimationFrame(animate);
            }
            animate();
        };
    </script>
</body>

</html>
