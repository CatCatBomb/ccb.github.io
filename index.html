<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>影人合作表演 - 交互版</title>
    <style>
        body {
            margin: 0;
            background: #f5e8d3;
            font-family: sans-serif;
        }

        canvas {
            display: block;
            margin: 20px auto;
            border: 4px solid #333;
            background: #fffaf0;
        }

        .tips {
            text-align: center;
            color: #666;
        }
    </style>
</head>

<body><canvas id="stage" width="900" height="500"></canvas>
    <div class="tips">操作说明:<br>
        1点击发光点触发动作<br>
        2拖拽蓝色点(上身)+红色点(下身)方向一致-人影移动<br>3同时同向旋转-人影转身</div>
    <script>
        const canvas = document.getElementById('stage'); const ctx = canvas.getContext('2d'); const W = 900, H = 500;
        let puppetX = 450, puppetY = 280;//人影中心位置
        let puppetAngle = 0; //整体旋转角度(度
        //控制点(相对于人影中心的偏移)一根据你图片手动微调
        const controlPoints = [
            { id: 'head', x: 0, y: -120, color: '#00f0ff', radius: 25, type: 'upper' }, //头
            { id: 'lhand', x: -80, y: -30, color: '#00f0ff', radius: 20, type: 'upper' },//左手
            { id: 'rhand', x: 70, y: -40, color: '#00f0ff', radius: 20, type: 'upper' },//右手
            { id: 'lfoot', x: -40, y: 90, color: '#ff0066', radius: 18, type: 'lower' },//左脚
            { id: 'rfoot', x: 35, y: 95, color: '#ff0066', radius: 18, type: 'lower' }//右脚
        ];
        // 记录拖拽状态
        let activePointers = new Map(); // 存储所有活动的触点 { pointerId -> point }
        let lastUpperDrag = { dx: 0, dy: 0 };//上次上身拽向量
        let lastLowerDrag = { dx: 0, dy: 0 };//上次下身向量
        let dragStartPos = { x: 0, y: 0 };//拖拽起始人影位置
        let puppetStartPos = { x: 0, y: 0 };//拖拽起始人影位置
        let hasUpperPoint = false; // 是否有 upper 类型的触点被按下
        let hasLowerPoint = false; // 是否有 lower 类型的触点被按下
        let img = new Image();
        img.src = './0.png';//- 换成你的图片路径
        function draw() {
            ctx.clearRect(0, 0, W, H);
            //背景(羊皮纸)
            ctx.fillStyle = '#f5e8d3';
            ctx.fillRect(0, 0, W, H);
            ctx.save();
            ctx.translate(puppetX, puppetY);
            ctx.rotate(puppetAngle * Math.PI / 180);
            //绘制皮影人物
            ctx.drawImage(img, -img.width / 2, -img.height / 2);
            //绘制发光控制点(实时高亮)
            controlPoints.forEach(p => {
                const px = p.x;
                const py = p.y;
                //发光
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 25;
                ctx.beginPath();
                ctx.arc(px, py, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color + '44'; //半透明
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(px, py, 8, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.restore();
        }
        canvas.addEventListener('pointerdown', e => {
            e.preventDefault(); // 防止默认行为
            console.log("🚀 ~ e:", e)
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            console.log("🚀 ~ mx:", mx)
            const my = e.clientY - rect.top;
            console.log("🚀 ~ my:", my)
            //转换到人影坐标系
            const dx = mx - puppetX;
            const dy = my - puppetY;
            const rotatedX = dx * Math.cos(-puppetAngle * Math.PI / 180) - dy * Math.sin(-puppetAngle * Math.PI / 180);
            const rotatedY = dx * Math.sin(-puppetAngle * Math.PI / 180) + dy * Math.cos(-puppetAngle * Math.PI / 180);
            for (let p of controlPoints) {
                if (Math.hypot(rotatedX - p.x, rotatedY - p.y) < p.radius + 10) {
                    // 记录这个触点
                    activePointers.set(e.pointerId, {
                        point: p,
                        startX: mx,
                        startY: my,
                        lastX: mx,
                        lastY: my
                    });
                    // 更新类型状态
                    if (p.type === 'upper') hasUpperPoint = true;
                    if (p.type === 'lower') hasLowerPoint = true;

                    // 如果是第一个触点，记录人影起始位置
                    if (activePointers.size === 1) {
                        puppetStartPos = { x: puppetX, y: puppetY };
                    }

                    console.log(`触点 ${p.id} (${p.type}) 被按下，当前触点数: ${activePointers.size}`);
                    canvas.setPointerCapture(e.pointerId); // 捕获指针
                    return;
                }
            }
        });
        canvas.addEventListener('pointermove', e => {
            const rect = canvas.getBoundingClientRect();
            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;

            // 如果这个触点没有在追踪，跳过
            if (!activePointers.has(e.pointerId)) return;

            const pointerInfo = activePointers.get(e.pointerId);

            // 计算这个触点的移动向量
            const moveDx = mx - pointerInfo.lastX;
            const moveDy = my - pointerInfo.lastY;

            // 更新最后位置
            pointerInfo.lastX = mx;
            pointerInfo.lastY = my;

            // 只有当同时有 upper 和 lower 触点时才移动
            if (hasUpperPoint && hasLowerPoint) {
                // 计算所有 active 触点的平均移动方向
                let totalDx = 0, totalDy = 0;
                let count = 0;

                activePointers.forEach(info => {
                    const dx = info.lastX - info.startX;
                    const dy = info.lastY - info.startY;
                    totalDx += dx;
                    totalDy += dy;
                    count++;
                });

                if (count > 0) {
                    // 使用平均移动量更新人影位置
                    const avgDx = totalDx / count;
                    const avgDy = totalDy / count;
                    puppetX = puppetStartPos.x + avgDx;
                    puppetY = puppetStartPos.y + avgDy;

                    // 记录上下身移动向量用于判断
                    activePointers.forEach(info => {
                        const dx = info.lastX - info.startX;
                        const dy = info.lastY - info.startY;
                        if (info.point.type === 'upper') {
                            lastUpperDrag = { dx, dy };
                        } else if (info.point.type === 'lower') {
                            lastLowerDrag = { dx, dy };
                        }
                    });

                    //判断上下身方向是否一致
                    const sameDir = Math.abs(lastUpperDrag.dx - lastLowerDrag.dx) < 50 && Math.abs(lastUpperDrag.dy - lastLowerDrag.dy) < 50;
                    const hasMovement = Math.hypot(lastUpperDrag.dx, lastUpperDrag.dy) > 10 || Math.hypot(lastLowerDrag.dx, lastLowerDrag.dy) > 10;

                    if (sameDir && hasMovement) {
                        console.log('上下身配合成功-人影移动!');
                        // 可以在这里添加走路动画
                    } else if (hasMovement && !sameDir) {
                        console.log('上下身方向不一致-人影不移动');
                    }
                }
            }

            draw();
        });
        canvas.addEventListener('pointerup', e => {
            if (activePointers.has(e.pointerId)) {
                const pointerInfo = activePointers.get(e.pointerId);

                // 计算这个触点的总移动距离
                const totalMove = Math.hypot(pointerInfo.lastX - pointerInfo.startX, pointerInfo.lastY - pointerInfo.startY);

                // 点击触发动作示例（移动距离很小认为是点击）
                if (totalMove < 5) {
                    console.log(`点击了 ${pointerInfo.point.id}，触发表演动作!`);// 这里可以播放预制动画序列
                }

                // 更新类型状态
                if (pointerInfo.point.type === 'upper') hasUpperPoint = false;
                if (pointerInfo.point.type === 'lower') hasLowerPoint = false;

                // 移除触点
                activePointers.delete(e.pointerId);
                canvas.releasePointerCapture(e.pointerId);

                console.log(`触点 ${pointerInfo.point.id} 被释放，剩余触点数: ${activePointers.size}`);
            }
        });
        //支持多点触摸(手机必备)
        canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
        // 处理触点取消事件
        canvas.addEventListener('pointercancel', e => {
            if (activePointers.has(e.pointerId)) {
                const pointerInfo = activePointers.get(e.pointerId);
                if (pointerInfo.point.type === 'upper') hasUpperPoint = false;
                if (pointerInfo.point.type === 'lower') hasLowerPoint = false;
                activePointers.delete(e.pointerId);
                canvas.releasePointerCapture(e.pointerId);
                console.log(`触点 ${pointerInfo.point.id} 被取消，剩余触点数: ${activePointers.size}`);
            }
        });
        //启动
        img.onload = () => {
            draw;
            //每帧刷新(可改 requestAnimationFrame)
            setInterval(draw, 16);
        };
    </script>
</body>

</html>
